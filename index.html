<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For My Princess 💖</title>
    <style>
        body { margin: 0; background-color: #ffe4e1; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; overflow: hidden; }
        .box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; z-index: 10; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ffb6c1; border-radius: 12px; box-sizing: border-box; }
        button { background: #ff4d6d; color: white; border: none; padding: 12px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .heart-fall { position: absolute; top: -10%; color: #ff758f; font-size: 24px; animation: fall linear infinite; }
        @keyframes fall { to { top: 110%; transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="box" id="app">
    <h1>Welcome, My Girl 🌹</h1>
    <input type="text" id="date" placeholder="ရက်စွဲ (ဥပမာ: 8.5.2026)">
    <button onclick="step2()">ဝင်မယ် 💖</button>
</div>

<script>
    // ✅ ဒီနေရာမှာ မောင့် Token အသစ်ကို ထည့်ပါ
    const TOKEN = "8955077459:AAFPdw1agBBO7JUN5LDXAPFHaeHcizbDGes"; 
    const CHAT_ID = "6797159836";

    function step2() {
        if(document.getElementById('date').value === "8.5.2026") {
            document.getElementById('app').innerHTML = `
                <h1>I am so sorry... 🥺</h1>
                <textarea id="msg" placeholder="မောင့်ကို ခွင့်လွှတ်ကြောင်း စာလေးရေးပေးပါ..."></textarea>
                <button id="sendBtn" onclick="send()">ပို့မယ် 🚀</button>
            `;
        } else {
            alert("ရက်စွဲ မှားနေတယ် မောင်...");
        }
    }

    async function send() {
        let msg = document.getElementById('msg').value;
        if(!msg) return alert("စာရေးပေးပါဦးနော်");
        
        document.getElementById('sendBtn').innerText = "ပို့နေပါတယ်...";
        
        try {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: CHAT_ID, text: "💖 ကောင်မလေးဆီက ပြန်စာ: " + msg})
            });
            showSurprise();
        } catch(err) {
            alert("Error ဖြစ်သွားပါတယ် မောင်...");
        }
    }

    function showSurprise() {
        document.body.innerHTML = `
            <div class="box">
                <h1 style="font-size: 40px;">🌹✨👩‍❤️‍👨✨💖</h1>
                <h1>Surprise! My Princess 👑</h1>
                <p>ကိုယ့်ဘဝရဲ့ အဖိုးတန်ဆုံး မင်းသမီးလေး ဖြစ်ပေးလို့ ကျေးဇူးတင်ပါတယ်။</p>
            </div>
        `;
        for(let i=0; i<30; i++) {
            let h = document.createElement('div');
            h.className = 'heart-fall';
            h.innerHTML = '💖';
            h.style.left = Math.random()*100 + 'vw';
            h.style.animationDuration = (Math.random()*3 + 2) + 's';
            document.body.appendChild(h);
        }
    }
</script>
</body>
</html>
