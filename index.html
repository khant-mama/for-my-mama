<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Princess 💖</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #ffe4e1; font-family: sans-serif; text-align: center; }
        .box { background-color: white; padding: 40px 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 2px solid #ffb6c1; max-width: 500px; width: 90%; }
        .btn-love { background-color: #ff4d6d; color: white; border: none; padding: 14px 35px; border-radius: 50px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        .reply-textarea { width: 100%; height: 100px; padding: 12px; border: 2px solid #ffb6c1; border-radius: 12px; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; outline: none; resize: none; text-align: left; }
        .reply-input { width: 100%; padding: 12px; border: 2px solid #ffb6c1; border-radius: 10px; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>

    <div class="box" id="mainBox">
        <h1>Welcome, My Girl 🌹</h1>
        <p style="color: #555;">ကျွန်တော်တို့နှစ်ယောက်ရဲ့ အမှတ်တရနေ့လေး (Date) ကို ရိုက်ထည့်ပြီး ဝင်ပေးပါနော်...</p>
        <input type="text" id="dateInput" class="reply-input" placeholder="ဥပမာ: 8.5.2026">
        <button class="btn-love" onclick="checkDate()">ဝင်မယ် 💖</button>
    </div>

    <script>
        // ✅ ဒီနေရာမှာ ပုံထဲက အမှန်အတိုင်း ထည့်ပေးထားပါတယ်
        const TELEGRAM_BOT_TOKEN = "8955077459:AAFPdw1agBB07JUN5LDXAPFHaeHcizBDGes"; 
        const TELEGRAM_CHAT_ID = "6797159836"; 

        function checkDate() {
            if (document.getElementById('dateInput').value.trim() === "8.5.2026") {
                showApology();
            } else {
                alert("ရက်စွဲလေး ပြန်စစ်ကြည့်ပါဦးနော်... 🥺");
            }
        }

        function showApology() {
            document.getElementById('mainBox').innerHTML = `
                <h1>I am so sorry... 🥺</h1>
                <p>ကိုယ်မှားသွားတဲ့အတွက် တောင်းပန်ပါတယ်... စာလေးတစ်စောင်လောက်တော့ ရေးပေးပါနော်။</p>
                <textarea id="replyText" class="reply-textarea" placeholder="ဒီမှာ စာရိုက်ပါ..."></textarea>
                <button class="btn-love" id="sendBtn" onclick="sendMessage()">ပို့မယ် 🚀</button>
            `;
        }

        async function sendMessage() {
            const text = document.getElementById('replyText').value;
            if (!text) return alert("စာရေးပေးပါဦးနော်");
            
            const btn = document.getElementById('sendBtn');
            btn.innerText = "ပို့နေပါတယ်...";
            
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: "💖 ကောင်မလေးဆီက ပြန်စာ: " + text })
                });
                alert("စာလေး ရောက်သွားပါပြီ မောင်! ကျေးဇူးတင်ပါတယ် 😍");
                location.reload();
            } catch (e) {
                alert("Error ဖြစ်သွားပါတယ် မောင်...");
            }
        }
    </script>
</body>
</html>
